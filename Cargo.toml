[package]
name = "aether-agent"
version = "0.1.0"
edition = "2021"
description = "LLM-native embeddable browser engine – semantic perception layer for AI agents"
license = "MIT"
repository = "https://github.com/robinandreeklund-collab/AetherAgent"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
html5ever = "0.27"
markup5ever_rcdom = "0.3"

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = "z"    # minimera binärstorlek
lto = true
codegen-units = 1
panic = "abort"    # mindre WASM-output

[profile.dev]
opt-level = 0
debug = true
