[package]
name = "aether-agent"
version = "0.1.0"
edition = "2021"
description = "LLM-native embeddable browser engine – semantic perception layer for AI agents"
license = "MIT"
repository = "https://github.com/robinandreeklund-collab/AetherAgent"
autobenches = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
html5ever = "0.27"
markup5ever_rcdom = "0.3"

# Server dependencies (only for native binary, not WASM)
axum = { version = "0.7", optional = true }
tokio = { version = "1", features = ["full"], optional = true }
tower-http = { version = "0.5", features = ["cors"], optional = true }

# JS evaluation engine (Fas 4b – optional, adds ~2MB to binary)
boa_engine = { version = "0.21", optional = true }

# HTTP fetch (Fas 7 – optional, for standalone page fetching)
reqwest = { version = "0.12", features = ["cookies", "gzip", "brotli", "rustls-tls", "rustls-tls-native-roots"], optional = true, default-features = false }

# Fas 8: Ethical Engine – robots.txt (Google's parser) + rate limiting
robotstxt = { version = "0.3", optional = true }
governor = { version = "0.10", optional = true }

# Fas 8: MCP Server – Model Context Protocol
rmcp = { version = "1.2", features = ["server", "transport-io", "macros"], optional = true }
schemars = { version = "0.8", optional = true }
base64 = { version = "0.22", optional = true }

# Fas 11: Vision – YOLOv8 inference via rten (optional, feature-gated)
rten = { version = "0.15", optional = true }
rten-imageproc = { version = "0.15", optional = true }
rten-tensor = { version = "0.15", optional = true }
image = { version = "0.25", optional = true }

[dev-dependencies]
wasm-bindgen-test = "0.3"

[features]
default = []
server = ["axum", "tokio", "tower-http", "js-eval", "fetch", "base64"]
js-eval = ["boa_engine"]
fetch = ["reqwest", "tokio", "robotstxt", "governor"]
mcp = ["rmcp", "tokio", "schemars", "base64"]
vision = ["rten", "rten-imageproc", "rten-tensor", "image"]

[[bin]]
name = "aether-server"
path = "src/bin/server.rs"
required-features = ["server"]

[[bin]]
name = "aether-mcp"
path = "src/bin/mcp_server.rs"
required-features = ["mcp"]

[[bin]]
name = "aether-bench"
path = "benches/bench_main.rs"

[profile.release]
opt-level = "z"    # minimera binärstorlek
lto = true
codegen-units = 1
panic = "abort"    # mindre WASM-output

[profile.dev]
opt-level = 0
debug = true
