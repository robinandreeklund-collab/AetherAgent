<!DOCTYPE html>
<html lang="sv">
<head><title>Kassa – SuperShop</title></head>
<body>
  <header>
    <nav>
      <a href="/">SuperShop</a>
      <span>Steg 2 av 3: Leveransuppgifter</span>
    </nav>
  </header>
  <main>
    <h1>Leveransuppgifter</h1>
    <form id="checkout-form" action="/api/checkout" method="POST">
      <fieldset>
        <legend>Kontaktuppgifter</legend>
        <label for="email">E-post</label>
        <input type="email" id="email" name="email" required />
        <label for="phone">Telefon</label>
        <input type="tel" id="phone" name="phone" />
      </fieldset>
      <fieldset>
        <legend>Leveransadress</legend>
        <label for="name">Fullständigt namn</label>
        <input type="text" id="name" name="name" required />
        <label for="address">Gatuadress</label>
        <input type="text" id="address" name="address" required />
        <label for="postal">Postnummer</label>
        <input type="text" id="postal" name="postal_code" pattern="[0-9]{5}" required />
        <label for="city">Stad</label>
        <input type="text" id="city" name="city" required />
      </fieldset>
      <fieldset>
        <legend>Leveranssätt</legend>
        <label><input type="radio" name="shipping" value="postnord" checked /> PostNord – 49 kr (2–4 dagar)</label>
        <label><input type="radio" name="shipping" value="instabox" /> Instabox – 39 kr (1–2 dagar)</label>
        <label><input type="radio" name="shipping" value="express" /> Express – 149 kr (nästa dag)</label>
      </fieldset>
      <div class="summary">
        <p>Summa: 13 990 kr</p>
        <p>Frakt: 49 kr</p>
        <p><strong>Totalt: 14 039 kr</strong></p>
      </div>
      <button type="submit" id="continue-btn">Fortsätt till betalning</button>
      <a href="/cart">Tillbaka till varukorgen</a>
    </form>
  </main>
</body>
</html>
