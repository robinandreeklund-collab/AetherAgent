<!DOCTYPE html>
<html lang="en">
<head><title>Document Editor</title></head>
<body>
  <header>
    <nav>
      <a href="/">Home</a>
      <a href="/documents">My Documents</a>
      <a href="/templates">Templates</a>
    </nav>
  </header>
  <main>
    <h1>Edit Document: Q1 Report</h1>
    <p>Last saved: March 27, 2026 at 14:32</p>
    <textarea rows="20" cols="80" aria-label="Document content">Revenue increased by 23% compared to Q4 2025...</textarea>
    <div class="actions">
      <button class="primary" id="save-btn">Save changes</button>
      <button class="secondary">Save as draft</button>
      <button class="danger" id="delete-btn">Delete document</button>
      <a href="/documents">Cancel and go back</a>
    </div>
  </main>
  <footer>
    <p>Document Editor v3.2</p>
  </footer>
</body>
</html>
