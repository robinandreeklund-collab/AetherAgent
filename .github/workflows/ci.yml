name: AetherAgent CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Rust-tester ────────────────────────────────────────────────────────────
  test:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Installera Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Kör tester (native)
        run: cargo test --lib --verbose
      
      - name: Kör clippy (linting)
        run: cargo clippy -- -D warnings
      
      - name: Formatcheck
        run: cargo fmt --check

  # ─── WASM-build ─────────────────────────────────────────────────────────────
  wasm-build:
    name: WASM build & size check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Installera Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Installera wasm-pack
        run: cargo install wasm-pack --locked
      
      - name: Bygg WASM (wasm32-unknown-unknown)
        run: wasm-pack build --target web --release
      
      - name: Kontrollera binärstorlek (max 6MB)
        run: |
          WASM_FILE=$(find pkg -name "*.wasm" | head -1)
          if [ -z "$WASM_FILE" ]; then
            echo "Ingen WASM-fil hittad!"
            exit 1
          fi
          SIZE=$(stat -c%s "$WASM_FILE")
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "WASM-storlek: ${SIZE_MB}MB ($SIZE bytes)"
          if [ $SIZE -gt 6291456 ]; then  # 6MB
            echo "WASM-fil för stor! Max 6MB."
            exit 1
          fi
          echo "✓ Storlek OK: ${SIZE_MB}MB"
      
      - name: Ladda upp WASM-artefakt
        uses: actions/upload-artifact@v4
        with:
          name: aether-agent-wasm
          path: pkg/
          retention-days: 7

  # ─── Python-integration ─────────────────────────────────────────────────────
  python-test:
    name: Python integration test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Sätt upp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Kör Python mock-test (utan WASM)
        run: python examples/python_test.py

  # ─── Security audit ─────────────────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Installera cargo-audit
        run: cargo install cargo-audit --locked
      
      - name: Kör säkerhetsaudit
        run: cargo audit
