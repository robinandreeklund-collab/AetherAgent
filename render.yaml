services:
  - type: web
    name: aether-agent-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 10000
      - key: AETHER_MODEL_URL
        sync: false  # Sätt manuellt i Render Dashboard efter modell-upload
    healthCheckPath: /health
